version: '3.8'

services:
  orchestrator:
    build: .
    environment:
      - OLLAMA_HOST=http://10.199.136.24:11434
      - GEMINI_API_KEY
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./training:/app/training
      - ./hips:/app/hips
      - /root/.gemini:/root/.gemini
    # Example command to run a specific URL (uncomment and modify to use)
    # command: --url https://www.preventionweb.net/understanding-disaster-risk/terminology/hips/mh0103 --output_dir data --languages fr,es,de --models gpt-oss:latest

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://10.199.136.24:11434
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - GEMINI_API_KEY
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./training:/app/training
      - /root/.gemini:/root/.gemini
    entrypoint: ["uvicorn", "api:app", "--app-dir", "translation-skill/scripts", "--host", "0.0.0.0", "--port", "8000"]

  ingest:
    build:
      context: dataverse
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - DATAVERSE_URL
      - DATAVERSE_ID
      - DATAVERSE_API_TOKEN
