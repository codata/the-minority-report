version: '3.8'

services:
  orchestrator:
    build: .
    environment:
      - OLLAMA_HOST=http://10.147.18.253:11434
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./training:/app/training
    # Example command to run a specific URL (uncomment and modify to use)
    # command: --url https://www.preventionweb.net/understanding-disaster-risk/terminology/hips/mh0103 --output_dir data --languages fr,es,de --models gpt-oss:latest

  ingest:
    build:
      context: dataverse
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - DATAVERSE_URL
      - DATAVERSE_ID
      - DATAVERSE_API_TOKEN

  benchmark:
    build: .
    volumes:
      - ./data:/app/data
      - ./benchmark_report.md:/app/benchmark_report.md
    environment:
      - SENTENCE_TRANSFORMER_MODEL=paraphrase-multilingual-MiniLM-L12-v2
      - SEMANTIC_SIMILARITY_THRESHOLD=${SEMANTIC_SIMILARITY_THRESHOLD:-0.9}
    entrypoint: [ "python3", "benchmark-skill/scripts/benchmark.py" ]
    command: >
      --google-sheet "https://docs.google.com/spreadsheets/d/1mutF1b-E_Y4FRHNTLWLEB_qjvBkwnpUvAPPgV_c4T-Y/edit?gid=1965989659#gid=1965989659" --translations-csv "/app/data/final_translations.csv" --output-report "/app/benchmark_report.md"
